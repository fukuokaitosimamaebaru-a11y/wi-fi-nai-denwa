<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wi-Fi 内線ビデオ電話 & 直感遠隔操作</title>
    <style>
        :root {
            --primary-color: #007aff;
            --success-color: #34c759;
            --danger-color: #ff3b30;
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
            --text-color: #1c1c1e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            user-select: none;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            padding: 25px;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 22px;
            text-align: center;
            margin-top: 0;
            margin-bottom: 15px;
        }

        .status-badge {
            display: block;
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            background-color: #e5e5ea;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .status-badge.waiting { background-color: #e1f5fe; color: #0288d1; }
        .status-badge.calling { background-color: #fff9c4; color: #f57f17; }
        .status-badge.connected { background-color: var(--success-color); color: white; }

        .section {
            margin-bottom: 15px;
            border: 1px solid #d1d1d6;
            border-radius: 12px;
            padding: 15px;
            background-color: #fafafa;
        }

        .section-title {
            font-size: 13px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 10px;
            color: #666;
        }

        .input-group {
            margin-bottom: 10px;
        }

        input[type="tel"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #c7c7cc;
            border-radius: 8px;
            font-size: 18px;
            letter-spacing: 1px;
            text-align: center;
            box-sizing: border-box;
        }

        button {
            display: block;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 8px;
        }

        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-success { background-color: var(--success-color); color: white; }
        .btn-danger { background-color: var(--danger-color); color: white; }
        .btn-secondary { background-color: #8e8e93; color: white; }

        .hidden { display: none !important; }

        /* ビデオ表示エリア */
        .video-container {
            width: 100%;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
            position: relative;
            aspect-ratio: 4 / 3;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            cursor: crosshair; /* 操作可能であることを直感的に示す */
        }

        /* 自分のカメラ映像（小窓） */
        .local-video-box {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 30%;
            aspect-ratio: 4 / 3;
            border: 2px solid white;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 10;
            background-color: #222;
        }

        /* 全画面化ボタン */
        .fullscreen-btn {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 40px;
            height: 40px;
            background-color: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            border-radius: 8px;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 11;
            cursor: pointer;
        }

        /* 【重要】全画面表示になったら自分を消す設定 */
        .video-container:fullscreen .local-video-box {
            display: none !important;
        }
        .video-container:-webkit-full-screen .local-video-box {
            display: none !important;
        }

        .video-container:fullscreen {
            width: 100vw;
            height: 100vh;
            aspect-ratio: auto;
            border-radius: 0;
            margin: 0;
        }

        .control-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        /* 操作された側に現れるリアルタイムポインター（ドラッグ軌跡） */
        #remote-pointer {
            position: absolute;
            width: 16px;
            height: 16px;
            border: 2px solid #ff3b30;
            background-color: rgba(255, 59, 48, 0.6);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 999;
            display: none;
            box-shadow: 0 0 8px rgba(255, 59, 48, 0.8);
        }

        /* テスト用：遠隔操作を実験するための動かせるターゲットブロック */
        .test-sandbox {
            margin-top: 15px;
            background: #e5e5ea;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            position: relative;
            height: 80px;
            overflow: hidden;
        }
        .draggable-box {
            position: absolute;
            left: 40%;
            top: 20px;
            width: 80px;
            height: 40px;
            background-color: var(--primary-color);
            color: white;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 6px;
            cursor: move;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>

<div class="container">
    <h1>Wi-Fi 内線テレビ電話</h1>
    <div id="status" class="status-badge">通信システム準備中...</div>

    <!-- ビデオ画面エリア -->
    <div id="video-area" class="video-container hidden">
        <video id="remote-video" autoplay playsinline></video>
        <div id="remote-pointer"></div>
        <div id="local-video-container" class="local-video-box">
            <video id="local-video" autoplay playsinline muted></video>
        </div>
        <button id="btn-fullscreen" class="fullscreen-btn" title="全画面表示">⛶</button>
    </div>

    <!-- 自身の番号設定 -->
    <div id="my-number-section" class="section">
        <div class="section-title">自分の090番号を設定</div>
        <div class="input-group">
            <input type="tel" id="my-number" placeholder="090-0000-0000" maxlength="13">
        </div>
        <button id="btn-register" class="btn-primary">この番号で待受開始</button>
    </div>

    <!-- ダイヤル発信パネル -->
    <div id="dial-section" class="section hidden">
        <div class="section-title">相手に電話をかける</div>
        <div class="input-group">
            <input type="tel" id="target-number" placeholder="090-0000-0000" maxlength="13">
        </div>
        <button id="btn-call" class="btn-success">ビデオ通話を発信</button>
    </div>

    <!-- 遠隔操作の動作実験用ボックス（画面共有した側のサイト内で動きます） -->
    <div id="sandbox-section" class="section hidden">
        <div class="section-title">操作実験用ミニ広場（画面共有時にここを遠隔ドラッグ可能）</div>
        <div class="test-sandbox">
            <div id="test-box" class="draggable-box">ドラッグ枠</div>
        </div>
    </div>

    <!-- コントロールパネル -->
    <div id="action-section" class="hidden">
        <div class="control-grid">
            <button id="btn-toggle-video" class="btn-secondary">カメラ: ON</button>
            <button id="btn-share-screen" class="btn-primary">画面共有</button>
        </div>
        <button id="btn-hangup" class="btn-danger">通話を終了</button>
    </div>
</div>

<script>
    function formatPhoneNumber(input) {
        let value = input.value.replace(/\D/g, '');
        if (value.length > 3 && value.length <= 7) {
            value = value.replace(/^(\d{3})(\d+)/, '$1-$2');
        } else if (value.length > 7) {
            value = value.replace(/^(\d{3})(\d{4})(\d+)/, '$1-$2-$3');
        }
        input.value = value;
    }

    const myNumberInput = document.getElementById('my-number');
    const targetNumberInput = document.getElementById('target-number');
    myNumberInput.addEventListener('input', () => formatPhoneNumber(myNumberInput));
    targetNumberInput.addEventListener('input', () => formatPhoneNumber(targetNumberInput));

    const statusBadge = document.getElementById('status');
    const btnHangup = document.getElementById('btn-hangup');
    const dialSection = document.getElementById('dial-section');
    const myNumberSection = document.getElementById('my-number-section');
    const videoArea = document.getElementById('video-area');
    const actionSection = document.getElementById('action-section');
    const sandboxSection = document.getElementById('sandbox-section');
    const btnToggleVideo = document.getElementById('btn-toggle-video');
    const btnShareScreen = document.getElementById('btn-share-screen');
    const btnFullscreen = document.getElementById('btn-fullscreen');

    const localVideo = document.getElementById('local-video');
    const remoteVideo = document.getElementById('remote-video');
    const remotePointer = document.getElementById('remote-pointer');
    const testBox = document.getElementById('test-box');

    let peer = null;
    let currentCall = null;
    let dataConnection = null;
    let localStream = null;
    let screenStream = null;
    let myNumber = '';
    let isVideoEnabled = true;
    let isScreenSharing = false;
    let isMouseDown = false;

    // 自環境内でのテストボックスのドラッグローカル処理
    let isDraggingLocal = false;
    let offsetX, offsetY;
    testBox.addEventListener('mousedown', (e) => {
        isDraggingLocal = true;
        offsetX = e.clientX - testBox.getBoundingClientRect().left;
        offsetY = e.clientY - testBox.getBoundingClientRect().top;
    });
    document.addEventListener('mousemove', (e) => {
        if (!isDraggingLocal) return;
        const sandbox = document.querySelector('.test-sandbox').getBoundingClientRect();
        let left = e.clientX - sandbox.left - offsetX;
        let top = e.clientY - sandbox.top - offsetY;
        testBox.style.left = `${Math.max(0, Math.min(left, sandbox.width - 80))}px`;
        testBox.style.top = `${Math.max(0, Math.min(top, sandbox.height - 40))}px`;
    });
    document.addEventListener('mouseup', () => { isDraggingLocal = false; });

    statusBadge.textContent = "自分の番号を設定してください";

    async function initMedia() {
        if (!localStream) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: { facingMode: 'user' } });
                localVideo.srcObject = localStream;
            } catch (e) {
                alert('アクセス許可が必要です: ' + e.message);
                throw e;
            }
        }
    }

    // 登録と着信監視
    document.getElementById('btn-register').addEventListener('click', () => {
        const rawNumber = myNumberInput.value.trim();
        if (rawNumber.length < 13) return alert('090番号を正しく入力してください');

        myNumber = rawNumber;
        statusBadge.textContent = "サーバーに接続中...";
        statusBadge.className = "status-badge waiting";

        const peerId = 'wifi-naisen-' + myNumber.replace(/-/g, '');
        peer = new Peer(peerId, { debug: 1 });

        peer.on('open', () => {
            statusBadge.textContent = `${myNumber} で着信待受中`;
            myNumberSection.classList.add('hidden');
            dialSection.classList.remove('hidden');
            sandboxSection.classList.remove('hidden'); // 実験場を表示
        });

        peer.on('connection', (conn) => setupDataHandling(conn));

        peer.on('call', async (incomingCall) => {
            const fromId = incomingCall.peer.replace('wifi-naisen-', '');
            const formattedFrom = fromId.replace(/^(\d{3})(\d{4})(\d{4})$/, '$1-$2-$3');
            if (confirm(`${formattedFrom} から着信。出ますか？`)) {
                try {
                    statusBadge.textContent = "接続中...";
                    await initMedia();
                    videoArea.classList.remove('hidden');
                    incomingCall.answer(localStream);
                    setupCallHandling(incomingCall, formattedFrom);
                } catch (e) { incomingCall.close(); }
            } else { incomingCall.close(); }
        });
    });

    // 発信
    document.getElementById('btn-call').addEventListener('click', async () => {
        const targetNumber = targetNumberInput.value.trim();
        if (targetNumber.length < 13 || targetNumber === myNumber) return alert('発信先が不正です');

        statusBadge.textContent = `${targetNumber} を呼出中...`;
        statusBadge.className = "status-badge calling";
        dialSection.classList.add('hidden');

        try {
            await initMedia();
            videoArea.classList.remove('hidden');
            const targetPeerId = 'wifi-naisen-' + targetNumber.replace(/-/g, '');
            
            const conn = peer.connect(targetPeerId);
            setupDataHandling(conn);

            const call = peer.call(targetPeerId, localStream);
            setupCallHandling(call, targetNumber);
        } catch (e) { resetToWaitState(); }
    });

    function setupCallHandling(call, partnerNumber) {
        currentCall = call;
        actionSection.classList.remove('hidden');
        call.on('stream', (remoteStream) => {
            statusBadge.textContent = `通話中 (${partnerNumber})`;
            statusBadge.className = "status-badge connected";
            remoteVideo.srcObject = remoteStream;
        });
        call.on('close', () => { alert("通話終了"); resetToWaitState(); });
    }

    // 📡 【重要】直感遠隔リアルタイム操作通信（DataChannelデータ処理）
    function setupDataHandling(conn) {
        dataConnection = conn;
        conn.on('data', (data) => {
            if (!isScreenSharing) return; // 画面共有している側のみイベントを実行する

            // 相手から送られてきた比率座標を、自分の現在のブラウザ絶対座標に逆変換
            const absX = window.innerWidth * data.x;
            const absY = window.innerHeight * data.y;

            if (data.action === 'down' || data.action === 'move') {
                showRemotePointer(data.x, data.y);
            } else if (data.action === 'up') {
                remotePointer.style.display = 'none';
            }

            // 該当座標にあるHTML要素を抽出
            const targetEl = document.elementFromPoint(absX, absY);
            if (!targetEl) return;

            // 直感アクション擬似エミュレート
            if (data.action === 'down') {
                const mouseDownEvt = new MouseEvent('mousedown', { clientX: absX, clientY: absY, bubbles: true });
                targetEl.dispatchEvent(mouseDownEvt);
            } else if (data.action === 'move') {
                const mouseMoveEvt = new MouseEvent('mousemove', { clientX: absX, clientY: absY, bubbles: true });
                targetEl.dispatchEvent(mouseMoveEvt);
            } else if (data.action === 'up') {
                const mouseUpEvt = new MouseEvent('mouseup', { clientX: absX, clientY: absY, bubbles: true });
                targetEl.dispatchEvent(mouseUpEvt);
                // 通常クリックも発火
                if (typeof targetEl.click === 'function') targetEl.click();
            } else if (data.action === 'dblclick') {
                const dblClickEvt = new MouseEvent('dblclick', { clientX: absX, clientY: absY, bubbles: true });
                targetEl.dispatchEvent(dblClickEvt);
            }
        });
    }

    function showRemotePointer(perX, perY) {
        const rect = videoArea.getBoundingClientRect();
        remotePointer.style.left = `${rect.width * perX}px`;
        remotePointer.style.top = `${rect.height * perY}px`;
        remotePointer.style.display = 'block';
    }

    // 🖱️ 【操作側】相手の画面に対するマウスドラッグ・クリックイベントを検知して送信
    function sendMouseEvent(actionName, e) {
        if (!dataConnection || !dataConnection.open) return;
        const rect = remoteVideo.getBoundingClientRect();
        const pctX = (e.clientX - rect.left) / rect.width;
        const pctY = (e.clientY - rect.top) / rect.height;
        
        // 映像の範囲内データのみ送信
        if (pctX >= 0 && pctX <= 1 && pctY >= 0 && pctY <= 1) {
            dataConnection.send({ action: actionName, x: pctX, y: pctY });
        }
    }

    remoteVideo.addEventListener('mousedown', (e) => { isMouseDown = true; sendMouseEvent('down', e); });
    remoteVideo.addEventListener('mousemove', (e) => { if (isMouseDown) sendMouseEvent('move', e); });
    window.addEventListener('mouseup', (e) => { if (isMouseDown) { isMouseDown = false; sendMouseEvent('up', e); } });
    remoteVideo.addEventListener('dblclick', (e) => { sendMouseEvent('dblclick', e); });

    // カメラ切り替え
    btnToggleVideo.addEventListener('click', () => {
        if (localStream && !isScreenSharing) {
            isVideoEnabled = !isVideoEnabled;
            localStream.getVideoTracks().forEach(track => track.enabled = isVideoEnabled);
            btnToggleVideo.textContent = isVideoEnabled ? "カメラ: ON" : "カメラ: OFF";
        }
    });

    // 画面共有処理
    btnShareScreen.addEventListener('click', async () => {
        if (!currentCall) return;
        if (!isScreenSharing) {
            try {
                screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const videoTrack = screenStream.getVideoTracks()[0];
                const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
                if (sender) sender.replaceTrack(videoTrack);

                localVideo.srcObject = screenStream;
                isScreenSharing = true;
                btnShareScreen.textContent = "共有を停止";
                btnToggleVideo.disabled = true;
                videoTrack.onended = () => stopScreenShare();
            } catch (e) { console.error(e); }
        } else { stopScreenShare(); }
    });

    function stopScreenShare() {
        if (!isScreenSharing) return;
        if (screenStream) screenStream.getTracks().forEach(track => track.stop());
        const videoTrack = localStream.getVideoTracks()[0];
        const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
        if (sender && videoTrack) sender.replaceTrack(videoTrack);
        localVideo.srcObject = localStream;
        isScreenSharing = false;
        btnShareScreen.textContent = "画面共有";
        btnToggleVideo.disabled = false;
    }

    // 全画面表示制御
    btnFullscreen.addEventListener('click', () => {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            if (videoArea.requestFullscreen) videoArea.requestFullscreen();
            else if (videoArea.webkitRequestFullscreen) videoArea.webkitRequestFullscreen();
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
    });

    function onFullscreenChange() {
        const isFull = document.fullscreenElement || document.webkitFullscreenElement;
        btnFullscreen.textContent = isFull ? "内" : "⛶";
    }
    document.addEventListener('fullscreenchange', onFullscreenChange);
    document.addEventListener('webkitfullscreenchange', onFullscreenChange);

    btnHangup.addEventListener('click', () => {
        if (currentCall) currentCall.close();
        if (dataConnection) dataConnection.close();
        if (document.fullscreenElement || document.webkitFullscreenElement) {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
        resetToWaitState();
    });

    function resetToWaitState() {
        stopScreenShare();
        if (currentCall) currentCall = null;
        if (dataConnection) dataConnection = null;
        if (localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; }
        remoteVideo.srcObject = null;
        localVideo.srcObject = null;
        videoArea.classList.add('hidden');
        actionSection.classList.add('hidden');
        isVideoEnabled = true;
        btnToggleVideo.textContent = "カメラ: ON";

        if (myNumber) {
            statusBadge.textContent = `${myNumber} で着信待受中`;
            statusBadge.className = "status-badge waiting";
            dialSection.classList.remove('hidden');
        } else {
            statusBadge.textContent = "自分の番号を設定してください";
            statusBadge.className = "status-badge";
            myNumberSection.classList.remove('hidden');
            sandboxSection.classList.add('hidden');
        }
    }
</script>

</body>
</html>
