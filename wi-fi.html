<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wi-Fi 内線ビデオ電話 & 遠隔音声再生</title>
    <style>
        :root {
            --primary-color: #007aff;
            --success-color: #34c759;
            --danger-color: #ff3b30;
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
            --text-color: #1c1c1e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            padding: 25px;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 22px;
            text-align: center;
            margin-top: 0;
            margin-bottom: 15px;
        }

        .status-badge {
            display: block;
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            background-color: #e5e5ea;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .status-badge.waiting { background-color: #e1f5fe; color: #0288d1; }
        .status-badge.calling { background-color: #fff9c4; color: #f57f17; }
        .status-badge.connected { background-color: var(--success-color); color: white; }

        .section {
            margin-bottom: 15px;
            border: 1px solid #d1d1d6;
            border-radius: 12px;
            padding: 15px;
            background-color: #fafafa;
        }

        .section-title {
            font-size: 13px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 10px;
            color: #666;
        }

        .input-group {
            margin-bottom: 10px;
            display: flex;
            gap: 8px;
        }

        input[type="tel"], input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #c7c7cc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        input[type="tel"] {
            text-align: center;
            font-size: 18px;
            letter-spacing: 1px;
        }

        /* ファイル選択の見た目をクリーンに */
        .file-input-wrapper {
            position: relative;
            margin-bottom: 10px;
        }
        .file-input-label {
            display: block;
            background: #e5e5ea;
            color: #333;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
        }
        input[type="file"] {
            display: none;
        }

        button {
            display: block;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 8px;
        }

        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-success { background-color: var(--success-color); color: white; }
        .btn-danger { background-color: var(--danger-color); color: white; }
        .btn-secondary { background-color: #8e8e93; color: white; }
        .btn-action { width: auto; margin-bottom: 0; white-space: nowrap; }

        .hidden { display: none !important; }

        /* ビデオ表示エリア */
        .video-container {
            width: 100%;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
            position: relative;
            aspect-ratio: 4 / 3;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* 自分の映像（ワイプ窓） */
        .local-video-box {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 30%;
            aspect-ratio: 4 / 3;
            border: 2px solid white;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 10;
            background-color: #222;
        }

        /* 全画面化ボタン */
        .fullscreen-btn {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 40px;
            height: 40px;
            background-color: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            border-radius: 8px;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 11;
            cursor: pointer;
        }

        /* 全画面表示の際にワイプを完全に消すCSS */
        .video-container:fullscreen .local-video-box {
            display: none !important;
        }
        .video-container:-webkit-full-screen .local-video-box {
            display: none !important;
        }

        .video-container:fullscreen {
            width: 100vw;
            height: 100vh;
            aspect-ratio: auto;
            border-radius: 0;
            margin: 0;
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>

<div class="container">
    <h1>Wi-Fi 内線ビデオ電話</h1>
    <div id="status" class="status-badge">通信システム準備中...</div>

    <!-- ビデオ画面エリア（カメラのみ） -->
    <div id="video-area" class="video-container hidden">
        <video id="remote-video" autoplay playsinline></video>
        <div class="local-video-box">
            <video id="local-video" autoplay playsinline muted></video>
        </div>
        <button id="btn-fullscreen" class="fullscreen-btn" title="全画面表示">⛶</button>
    </div>

    <!-- 自分の番号設定 -->
    <div id="my-number-section" class="section">
        <div class="section-title">自分の090番号を設定</div>
        <div class="input-group">
            <input type="tel" id="my-number" placeholder="090-0000-0000" maxlength="13">
        </div>
        <button id="btn-register" class="btn-primary">この番号で待受開始</button>
    </div>

    <!-- ダイヤル発信パネル -->
    <div id="dial-section" class="section hidden">
        <div class="section-title">相手に電話をかける</div>
        <div class="input-group">
            <input type="tel" id="target-number" placeholder="090-0000-0000" maxlength="13">
        </div>
        <button id="btn-call" class="btn-success">ビデオ通話を発信</button>
    </div>

    <!-- 🔊 相手のスピーカーで音声を再生させる遠隔コントロールパネル -->
    <div id="audio-panel-section" class="section hidden">
        <div class="section-title">相手側での音声再生コントローラー</div>
        
        <!-- テキスト音読送信 -->
        <div class="input-group">
            <input type="text" id="tts-text" placeholder="相手に喋らせたいテキストを入力">
            <button id="btn-send-tts" class="btn-primary btn-action">音読再生</button>
        </div>

        <!-- 音声ファイル(mp3など)送信 -->
        <div class="file-input-wrapper">
            <label for="audio-file" class="file-input-label" id="file-label">🎵 音声ファイル(mp3等)を選択</label>
            <input type="file" id="audio-file" accept="audio/*">
        </div>
        <button id="btn-send-audio" class="btn-success" disabled>選択した音声ファイルを相手で再生</button>
    </div>

    <!-- コントロールパネル -->
    <div id="action-section" class="hidden">
        <button id="btn-toggle-video" class="btn-secondary">カメラ: ON</button>
        <button id="btn-hangup" class="btn-danger">通話を終了</button>
    </div>
</div>

<script>
    function formatPhoneNumber(input) {
        let value = input.value.replace(/\D/g, '');
        if (value.length > 3 && value.length <= 7) {
            value = value.replace(/^(\d{3})(\d+)/, '$1-$2');
        } else if (value.length > 7) {
            value = value.replace(/^(\d{3})(\d{4})(\d+)/, '$1-$2-$3');
        }
        input.value = value;
    }

    const myNumberInput = document.getElementById('my-number');
    const targetNumberInput = document.getElementById('target-number');
    myNumberInput.addEventListener('input', () => formatPhoneNumber(myNumberInput));
    targetNumberInput.addEventListener('input', () => formatPhoneNumber(targetNumberInput));

    const statusBadge = document.getElementById('status');
    const btnHangup = document.getElementById('btn-hangup');
    const dialSection = document.getElementById('dial-section');
    const myNumberSection = document.getElementById('my-number-section');
    const videoArea = document.getElementById('video-area');
    const actionSection = document.getElementById('action-section');
    const audioPanelSection = document.getElementById('audio-panel-section');
    
    const btnToggleVideo = document.getElementById('btn-toggle-video');
    const btnFullscreen = document.getElementById('btn-fullscreen');
    const btnSendTts = document.getElementById('btn-send-tts');
    const btnSendAudio = document.getElementById('btn-send-audio');
    const ttsTextInput = document.getElementById('tts-text');
    const audioFileInput = document.getElementById('audio-file');
    const fileLabel = document.getElementById('file-label');

    const localVideo = document.getElementById('local-video');
    const remoteVideo = document.getElementById('remote-video');

    let peer = null;
    let currentCall = null;
    let dataConnection = null; // 遠隔オーディオ制御信号用のデータチャンネル
    let localStream = null;
    let myNumber = '';
    let isVideoEnabled = true;
    let selectedAudioBase64 = "";

    statusBadge.textContent = "自分の番号を設定してください";

    async function initMedia() {
        if (!localStream) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: true, 
                    video: { facingMode: 'user' } 
                });
                localVideo.srcObject = localStream;
            } catch (e) {
                alert('カメラ・マイクのアクセス許可が必要です: ' + e.message);
                throw e;
            }
        }
    }

    // 番号登録・待受
    document.getElementById('btn-register').addEventListener('click', () => {
        const rawNumber = myNumberInput.value.trim();
        if (rawNumber.length < 13) return alert('090番号を正しく入力してください');

        myNumber = rawNumber;
        statusBadge.textContent = "サーバーに接続中...";
        statusBadge.className = "status-badge waiting";

        const peerId = 'wifi-naisen-' + myNumber.replace(/-/g, '');
        peer = new Peer(peerId, { debug: 1 });

        peer.on('open', () => {
            statusBadge.textContent = `${myNumber} で着信待受中`;
            myNumberSection.classList.add('hidden');
            dialSection.classList.remove('hidden');
        });

        // 遠隔コマンド通信用ラインの受信
        peer.on('connection', (conn) => setupDataHandling(conn));

        // ビデオ通話の受信
        peer.on('call', async (incomingCall) => {
            const fromId = incomingCall.peer.replace('wifi-naisen-', '');
            const formattedFrom = fromId.replace(/^(\d{3})(\d{4})(\d{4})$/, '$1-$2-$3');

            if (confirm(`${formattedFrom} から着信があります。出ますか？`)) {
                try {
                    statusBadge.textContent = "接続中...";
                    await initMedia();
                    
                    videoArea.classList.remove('hidden');
                    incomingCall.answer(localStream);
                    setupCallHandling(incomingCall, formattedFrom);
                } catch (e) {
                    incomingCall.close();
                }
            } else {
                incomingCall.close();
            }
        });
    });

    // 発信
    document.getElementById('btn-call').addEventListener('click', async () => {
        const targetNumber = targetNumberInput.value.trim();
        if (targetNumber.length < 13 || targetNumber === myNumber) return alert('発信先の番号が不正です');

        statusBadge.textContent = `${targetNumber} を呼出中...`;
        statusBadge.className = "status-badge calling";
        dialSection.classList.add('hidden');

        try {
            await initMedia();
            videoArea.classList.remove('hidden');

            const targetPeerId = 'wifi-naisen-' + targetNumber.replace(/-/g, '');
            
            // コマンドチャンネル接続
            const conn = peer.connect(targetPeerId);
            setupDataHandling(conn);

            // カメラ映像接続
            const call = peer.call(targetPeerId, localStream);
            setupCallHandling(call, targetNumber);
        } catch (e) {
            resetToWaitState();
        }
    });

    function setupCallHandling(call, partnerNumber) {
        currentCall = call;
        actionSection.classList.remove('hidden');
        audioPanelSection.classList.remove('hidden'); // 通話開始で再生制御パネルを解放

        call.on('stream', (remoteStream) => {
            statusBadge.textContent = `通話中 (${partnerNumber})`;
            statusBadge.className = "status-badge connected";
            remoteVideo.srcObject = remoteStream;
        });

        call.on('close', () => {
            alert("通話が終了しました");
            resetToWaitState();
        });
    }

    // 📡 【重要】相手からの遠隔再生シグナルの受け取り処理
    function setupDataHandling(conn) {
        dataConnection = conn;
        conn.on('data', (data) => {
            // 1. テキスト音読(TTS)コマンドを受けた場合
            if (data.type === 'tts' && data.text) {
                const utterance = new SpeechSynthesisUtterance(data.text);
                utterance.lang = 'ja-JP'; // 日本語読み上げに固定
                window.speechSynthesis.speak(utterance);
            } 
            // 2. 音声ファイル再生コマンドを受けた場合
            else if (data.type === 'audioFile' && data.audioData) {
                const audio = new Audio(data.audioData);
                audio.play().catch(e => console.error("音声自動再生ブロック対策:", e));
            }
        });
    }

    // ✍️ 相手のスピーカーへテキスト読み上げ要求を送信
    btnSendTts.addEventListener('click', () => {
        const text = ttsTextInput.value.trim();
        if (!text) return;
        if (dataConnection && dataConnection.open) {
            dataConnection.send({
                type: 'tts',
                text: text
            });
            ttsTextInput.value = ""; // 送信後にクリア
        } else {
            alert("通信ラインが確立されていません");
        }
    });

    // 🎵 音声ファイルが選択された時のローカル読み込み
    audioFileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        fileLabel.textContent = `選択中: ${file.name}`;
        
        const reader = new FileReader();
        reader.onload = function(event) {
            selectedAudioBase64 = event.target.result; // Base64形式に変換
            btnSendAudio.disabled = false;
        };
        reader.readAsDataURL(file);
    });

    // 🚀 変換した音声ファイルを相手に送信して再生
    btnSendAudio.addEventListener('click', () => {
        if (!selectedAudioBase64) return;
        if (dataConnection && dataConnection.open) {
            statusBadge.textContent = "音声データ転送中...";
            
            dataConnection.send({
                type: 'audioFile',
                audioData: selectedAudioBase64
            });

            setTimeout(() => {
                statusBadge.textContent = "通話中";
            }, 1500);
        } else {
            alert("通信ラインが確立されていません");
        }
    });

    // カメラON/OFF切り替え
    btnToggleVideo.addEventListener('click', () => {
        if (localStream) {
            isVideoEnabled = !isVideoEnabled;
            localStream.getVideoTracks().forEach(track => track.enabled = isVideoEnabled);
            btnToggleVideo.textContent = isVideoEnabled ? "カメラ: ON" : "カメラ: OFF";
        }
    });

    // 全画面表示制御
    btnFullscreen.addEventListener('click', () => {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            if (videoArea.requestFullscreen) {
                videoArea.requestFullscreen();
            } else if (videoArea.webkitRequestFullscreen) {
                videoArea.webkitRequestFullscreen();
            }
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            }
        }
    });

    function onFullscreenChange() {
        const isFull = document.fullscreenElement || document.webkitFullscreenElement;
        btnFullscreen.textContent = isFull ? "内" : "⛶";
    }
    document.addEventListener('fullscreenchange', onFullscreenChange);
    document.addEventListener('webkitfullscreenchange', onFullscreenChange);

    btnHangup.addEventListener('click', () => {
        if (currentCall) currentCall.close();
        if (dataConnection) dataConnection.close();
        if (document.fullscreenElement || document.webkitFullscreenElement) {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
        resetToWaitState();
    });

    function resetToWaitState() {
        if (currentCall) currentCall = null;
        if (dataConnection) dataConnection = null;
        
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }

        remoteVideo.srcObject = null;
        localVideo.srcObject = null;
        
        videoArea.classList.add('hidden');
        actionSection.classList.add('hidden');
        audioPanelSection.classList.add('hidden');
        
        isVideoEnabled = true;
        btnToggleVideo.textContent = "カメラ: ON";
        btnSendAudio.disabled = true;
        fileLabel.textContent = "🎵 音声ファイル(mp3等)を選択";
        selectedAudioBase64 = "";

        if (myNumber) {
            statusBadge.textContent = `${myNumber} で着信待受中`;
            statusBadge.className = "status-badge waiting";
            dialSection.classList.remove('hidden');
        } else {
            statusBadge.textContent = "自分の番号を設定してください";
            statusBadge.className = "status-badge";
            myNumberSection.classList.remove('hidden');
        }
    }
</script>

</body>
</html>
